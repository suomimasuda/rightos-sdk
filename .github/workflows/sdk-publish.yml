# Publish @i-s3/rightos (TypeScript SDK) to npm.
# Auth: npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN required.
# One-time setup: npm Packages → @i-s3/rightos → Settings → Trusted publishing
#   suomimasuda/rightos-sdk + workflow sdk-publish.yml
name: sdk-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "sdk-v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate tag matches package.json
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#sdk-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          test "$EXPECTED" = "$PKG_VER" || { echo "package.json version mismatch"; exit 1; }

      - name: Build TypeScript SDK
        run: |
          npm install
          npm run build

      - name: Publish to npm (Trusted Publishing / OIDC)
        run: |
          unset NODE_AUTH_TOKEN || true
          npm config set registry https://registry.npmjs.org/
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm publish --dry-run --access public
            echo "OIDC dry-run OK — Trusted Publisher is configured"
          else
            npm publish --access public
          fi

      - name: Publish fallback (legacy NPM_TOKEN — remove after OIDC verified)
        if: failure()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Publish failed. Configure npm Trusted Publisher or set NPM_TOKEN."
            exit 1
          fi
          echo "::warning::OIDC publish failed; falling back to NPM_TOKEN"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm publish --dry-run --access public
          else
            npm publish --access public
          fi
