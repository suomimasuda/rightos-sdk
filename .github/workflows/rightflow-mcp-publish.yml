# Publish @i-s3/rightflow-mcp to npm via Trusted Publishing (OIDC only).
# Do NOT create npm granular access tokens for CI — they expire ≤90 days.
# Setup: npm Packages → @i-s3/rightflow-mcp → Settings → Trusted publishing
#   owner=suomimasuda repo=rightos-sdk workflow=rightflow-mcp-publish.yml
name: rightflow-mcp-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "rightflow-mcp-v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: rightflow-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package.json
        if: startsWith(github.ref, 'refs/tags/rightflow-mcp-v')
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#rightflow-mcp-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          test "$EXPECTED" = "$PKG_VER" || { echo "package.json version mismatch"; exit 1; }

      - name: Build RightFlow MCP
        run: |
          npm ci
          npm run build

      - name: OIDC dry-run (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: bash ../scripts/oidc-npm-publish.sh dry-run

      - name: Publish to npm (tag)
        if: startsWith(github.ref, 'refs/tags/rightflow-mcp-v')
        run: bash ../scripts/oidc-npm-publish.sh publish
