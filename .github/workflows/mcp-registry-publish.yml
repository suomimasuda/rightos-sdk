# Publish @i-s3/rightos-mcp to npm (OIDC) and the official MCP Registry.
# Do NOT create npm granular access tokens for CI — they expire ≤90 days.
# Setup: npm Packages → @i-s3/rightos-mcp → Settings → Trusted publishing
#   owner=suomimasuda repo=rightos-sdk workflow=mcp-registry-publish.yml
name: mcp-registry-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "mcp-v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package and server.json versions
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#mcp-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          SERVER_VER=$(node -p "require('./server.json').version")
          echo "tag=$TAG expected=$EXPECTED pkg=$PKG_VER server=$SERVER_VER"
          test "$EXPECTED" = "$PKG_VER" || { echo "package.json version mismatch"; exit 1; }
          test "$EXPECTED" = "$SERVER_VER" || { echo "server.json version mismatch"; exit 1; }

      - name: Build MCP server
        run: |
          npm ci
          npm run build

      - name: OIDC dry-run (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: bash ../scripts/oidc-npm-publish.sh dry-run

      - name: Publish to npm (tag)
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: bash ../scripts/oidc-npm-publish.sh publish

      - name: Install MCP Publisher CLI
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: mcp-publisher publish

      - name: Verify registry listing (tag release or manual)
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          export PKG_VER
          curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.suomimasuda/rightos-mcp" \
            | python3 -c "
          import json, sys, os
          expected = os.environ['PKG_VER']
          d = json.load(sys.stdin)
          versions = [s['server']['version'] for s in d.get('servers', [])]
          assert expected in versions, f'expected {expected} in registry, got {versions}'
          print('registry OK:', d['servers'][0]['server']['name'], 'versions', versions)
          "
