# Weekly publish pipeline health ‚Äî fails loudly if credentials or registries break.
# GitHub sends email to repo watchers on failure (Settings ‚Üí Notifications).
name: publish-health

on:
  schedule:
    # Monday 00:00 UTC = 09:00 JST
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: npm registry ‚Äî package versions
        run: |
          set -eu
          TS=$(npm view @i-s3/rightos version)
          MCP=$(npm view @i-s3/rightos-mcp version)
          RF=$(npm view @i-s3/rightflow version)
          RFMCP=$(npm view @i-s3/rightflow-mcp version)
          PKG=$(node -p "require('./typescript/package.json').version")
          MCP_PKG=$(node -p "require('./mcp/package.json').version")
          RF_PKG=$(node -p "require('./rightflow/package.json').version")
          RFMCP_PKG=$(node -p "require('./rightflow-mcp/package.json').version")
          echo "npm @i-s3/rightos=$TS (repo typescript=$PKG)"
          echo "npm @i-s3/rightos-mcp=$MCP (repo mcp=$MCP_PKG)"
          echo "npm @i-s3/rightflow=$RF (repo rightflow=$RF_PKG)"
          echo "npm @i-s3/rightflow-mcp=$RFMCP (repo rightflow-mcp=$RFMCP_PKG)"
          test "$TS" = "$PKG" || { echo "::error::version mismatch @i-s3/rightos: npm=$TS repo=$PKG ‚Äî publish or sync repo"; exit 1; }
          test "$MCP" = "$MCP_PKG" || { echo "::error::version mismatch @i-s3/rightos-mcp: npm=$MCP repo=$MCP_PKG ‚Äî publish or sync repo"; exit 1; }
          test "$RF" = "$RF_PKG" || { echo "::error::version mismatch @i-s3/rightflow: npm=$RF repo=$RF_PKG ‚Äî publish or sync repo"; exit 1; }
          test "$RFMCP" = "$RFMCP_PKG" || { echo "::error::version mismatch @i-s3/rightflow-mcp: npm=$RFMCP repo=$RFMCP_PKG ‚Äî publish or sync repo"; exit 1; }

      - name: MCP Registry listing
        working-directory: mcp
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.suomimasuda/rightos-mcp" \
            | python3 -c "
          import json, sys
          expected = sys.argv[1]
          d = json.load(sys.stdin)
          versions = [s['server']['version'] for s in d.get('servers', [])]
          assert expected in versions, f'expected {expected} in registry, got {versions}'
          print('MCP Registry OK', versions)
          " "$PKG_VER"

      - name: PyPI ‚Äî rightos-sdk version (informational)
        continue-on-error: true
        run: |
          PY=$(grep '^version = ' python/pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          REMOTE=$(curl -fsS "https://pypi.org/pypi/rightos-sdk/json" | python3 -c "import json,sys; print(json.load(sys.stdin)['info']['version'])")
          echo "pypi rightos-sdk=$REMOTE (repo python=$PY)"
          if [ "$REMOTE" != "$PY" ]; then
            echo "::warning::PyPI ($REMOTE) lags repo ($PY) ‚Äî configure PyPI Trusted Publishing and run python-publish"
          fi

      - name: Production API smoke (read-only)
        run: |
          curl -sf "https://rightos.i-s3.com/api/rightos/status" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['status'] == 'operational', d
          for k in ('billing', 'email', 'webhooks', 'adminAuth'):
            assert d['checks'][k]['configured'], f'{k} not configured'
          print('production status OK', d.get('revision'))
          "
