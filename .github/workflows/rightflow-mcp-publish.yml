# Publish @i-s3/rightflow-mcp to npm.
# Auth: npm Trusted Publishing (OIDC) — no long-lived NPM_TOKEN required.
# One-time: npmjs.com → @i-s3/rightflow-mcp → Trusted Publisher
#   Repository: suomimasuda/rightos-sdk
#   Workflow: rightflow-mcp-publish.yml
name: rightflow-mcp-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "rightflow-mcp-v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rightflow-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package.json
        if: startsWith(github.ref, 'refs/tags/rightflow-mcp-v')
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#rightflow-mcp-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          test "$EXPECTED" = "$PKG_VER" || { echo "package.json version mismatch"; exit 1; }

      - name: Build RightFlow MCP
        run: |
          npm ci
          npm run build

      - name: Publish to npm (Trusted Publishing / OIDC)
        run: |
          unset NODE_AUTH_TOKEN || true
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            set +e
            out=$(npm publish --dry-run --access public --provenance 2>&1)
            code=$?
            set -e
            echo "$out"
            if [ "$code" -eq 0 ]; then
              echo "OIDC dry-run OK — Trusted Publisher is configured"
            elif echo "$out" | grep -q "cannot publish over the previously published versions"; then
              echo "OIDC OK — auth verified (version already on npm registry)"
            elif echo "$out" | grep -qiE 'ENEEDAUTH|401 Unauthorized|403 Forbidden|404 Not Found - PUT'; then
              echo "::error::OIDC/auth failed — configure Trusted Publisher on npm for this workflow"
              exit 1
            else
              exit "$code"
            fi
          else
            npm publish --access public --provenance
          fi
