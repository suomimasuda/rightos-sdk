# Publish @i-s3/rightflow-mcp to npm via Trusted Publishing (OIDC).
# npmjs.com → @i-s3/rightflow-mcp → Trusted Publisher
#   Repository: suomimasuda/rightos-sdk
#   Workflow: rightflow-mcp-publish.yml
#   Allow: npm publish
name: rightflow-mcp-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "rightflow-mcp-v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rightflow-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # registry-url required for OIDC exchange; dummy NODE_AUTH_TOKEN must be cleared before publish
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package.json
        if: startsWith(github.ref, 'refs/tags/rightflow-mcp-v')
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#rightflow-mcp-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          test "$EXPECTED" = "$PKG_VER" || { echo "package.json version mismatch"; exit 1; }

      - name: Build RightFlow MCP
        run: |
          npm ci
          npm run build

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: startsWith(github.ref, 'refs/tags/rightflow-mcp-v')
        run: |
          set -eu
          # setup-node injects placeholder token + always-auth; that breaks OIDC publish (often as E404).
          unset NODE_AUTH_TOKEN || true
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            rm -f "$NPM_CONFIG_USERCONFIG"
          fi
          unset NPM_CONFIG_USERCONFIG || true
          # Fresh npmrc without _authToken — rely on OIDC
          printf '%s\n' 'registry=https://registry.npmjs.org/' > .npmrc
          npm publish --access public --provenance
          rm -f .npmrc

      - name: Pack dry-run only (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm publish --dry-run --access public
          echo "Pack dry-run OK. Real publish happens on tag rightflow-mcp-v*."
