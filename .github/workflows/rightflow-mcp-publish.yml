# Publish @i-s3/rightflow-mcp via npm Trusted Publishing (OIDC).
# Requires: npm CLI >= 11.5.1; Trusted Publisher on package with Allow npm publish.
# npm: @i-s3/rightflow-mcp → Trusted Publisher
#   suomimasuda / rightos-sdk / rightflow-mcp-publish.yml / env blank
name: rightflow-mcp-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "rightflow-mcp-v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rightflow-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          # Do NOT set registry-url: it writes _authToken=${NODE_AUTH_TOKEN} and
          # blocks OIDC (ENEEDAUTH / misleading E404). See npm/documentation#1960

      - name: Use npm with Trusted Publishing support
        run: |
          set -eu
          npm install -g npm@11.6.2
          npm --version

      - name: Validate tag matches package.json
        if: startsWith(github.ref, 'refs/tags/rightflow-mcp-v')
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#rightflow-mcp-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          test "$EXPECTED" = "$PKG_VER" || { echo "package.json version mismatch"; exit 1; }

      - name: Build RightFlow MCP
        run: |
          npm ci
          npm run build

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: startsWith(github.ref, 'refs/tags/rightflow-mcp-v')
        run: |
          set -eu
          unset NODE_AUTH_TOKEN || true
          npm publish --access public --provenance

      - name: Pack dry-run only (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm publish --dry-run --access public
          echo "Pack dry-run OK. Real publish happens on tag rightflow-mcp-v*."
