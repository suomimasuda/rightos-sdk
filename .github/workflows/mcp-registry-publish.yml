# Publish @i-s3/rightos-mcp to npm and the official MCP Registry.
# Trigger: push tag mcp-vX.Y.Z (version must match package.json and server.json).
name: mcp-registry-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "mcp-v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate tag matches package and server.json versions
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          set -eu
          TAG="${GITHUB_REF#refs/tags/}"
          EXPECTED="${TAG#mcp-v}"
          PKG_VER=$(node -p "require('./package.json').version")
          SERVER_VER=$(node -p "require('./server.json').version")
          echo "tag=$TAG expected=$EXPECTED pkg=$PKG_VER server=$SERVER_VER"
          test "$EXPECTED" = "$PKG_VER" || { echo "package.json version mismatch"; exit 1; }
          test "$EXPECTED" = "$SERVER_VER" || { echo "server.json version mismatch"; exit 1; }

      - name: Build MCP server
        run: |
          npm ci
          npm run build

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          unset NODE_AUTH_TOKEN || true
          npm config set registry https://registry.npmjs.org/
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm publish --dry-run --access public
            echo "OIDC dry-run OK — Trusted Publisher is configured"
          else
            npm publish --access public
          fi

      - name: Publish fallback (legacy NPM_TOKEN — remove after OIDC verified)
        if: failure() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/mcp-v'))
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "false"
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Publish failed. Configure npm Trusted Publisher for @i-s3/rightos-mcp or set NPM_TOKEN."
            exit 1
          fi
          echo "::warning::OIDC publish failed; falling back to NPM_TOKEN"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm publish --dry-run --access public
          else
            npm publish --access public
          fi

      - name: Install MCP Publisher CLI
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish

      - name: Verify registry listing
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          export PKG_VER
          curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.suomimasuda/rightos-mcp" \
            | python3 -c "
          import json, sys, os
          expected = os.environ['PKG_VER']
          d = json.load(sys.stdin)
          versions = [s['server']['version'] for s in d.get('servers', [])]
          assert expected in versions, f'expected {expected} in registry, got {versions}'
          print('registry OK:', d['servers'][0]['server']['name'], 'versions', versions)
          "
