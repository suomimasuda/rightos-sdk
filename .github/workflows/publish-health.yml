# Weekly publish pipeline health — fails loudly if credentials or registries break.
# GitHub sends email to repo watchers on failure (Settings → Notifications).
name: publish-health

on:
  schedule:
    # Monday 00:00 UTC = 09:00 JST
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: npm registry — package versions
        run: |
          set -eu
          assert_match() {
            local name="$1" npm_v="$2" repo_v="$3" publish_hint="$4" sync_hint="$5"
            echo "npm $name=$npm_v (repo=$repo_v)"
            if [ "$npm_v" = "$repo_v" ]; then
              return 0
            fi
            # sort -V: which version is newer?
            local newer
            newer=$(printf '%s\n%s\n' "$npm_v" "$repo_v" | sort -V | tail -1)
            if [ "$newer" = "$npm_v" ]; then
              echo "::error::$name: repo ($repo_v) lags npm ($npm_v). $sync_hint"
            else
              echo "::error::$name: npm ($npm_v) lags repo ($repo_v). $publish_hint"
            fi
            exit 1
          }

          TS=$(npm view @i-s3/rightos version)
          MCP=$(npm view @i-s3/rightos-mcp version)
          RF=$(npm view @i-s3/rightflow version)
          RFMCP=$(npm view @i-s3/rightflow-mcp version)
          PKG=$(node -p "require('./typescript/package.json').version")
          MCP_PKG=$(node -p "require('./mcp/package.json').version")
          RF_PKG=$(node -p "require('./rightflow/package.json').version")
          RFMCP_PKG=$(node -p "require('./rightflow-mcp/package.json').version")

          assert_match "@i-s3/rightos" "$TS" "$PKG" \
            "Run sdk-publish (or tag rightos-v*)" \
            "Sync monorepo → rightos-sdk and push (./scripts/sync-rightos-sdk.sh --push typescript)"
          assert_match "@i-s3/rightos-mcp" "$MCP" "$MCP_PKG" \
            "Run mcp-registry-publish" \
            "Sync monorepo → rightos-sdk and push (./scripts/sync-rightos-sdk.sh --push mcp)"
          assert_match "@i-s3/rightflow" "$RF" "$RF_PKG" \
            "Run rightflow-publish (or tag rightflow-v*)" \
            "Sync monorepo → rightos-sdk and push (./scripts/sync-rightos-sdk.sh --push rightflow)"
          assert_match "@i-s3/rightflow-mcp" "$RFMCP" "$RFMCP_PKG" \
            "Run rightflow-mcp-publish (or tag rightflow-mcp-v*)" \
            "Sync monorepo → rightos-sdk and push (./scripts/sync-rightos-sdk.sh --push rightflow-mcp)"

      - name: MCP Registry listing
        working-directory: mcp
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          curl -fsS "https://registry.modelcontextprotocol.io/v0/servers?search=io.github.suomimasuda/rightos-mcp" \
            | python3 -c "
          import json, sys
          expected = sys.argv[1]
          d = json.load(sys.stdin)
          versions = [s['server']['version'] for s in d.get('servers', [])]
          assert expected in versions, f'expected {expected} in registry, got {versions}'
          print('MCP Registry OK', versions)
          " "$PKG_VER"

      - name: PyPI — rightos-sdk version (informational)
        continue-on-error: true
        run: |
          PY=$(grep '^version = ' python/pyproject.toml | sed 's/.*"\(.*\)".*/\1/')
          REMOTE=$(curl -fsS "https://pypi.org/pypi/rightos-sdk/json" | python3 -c "import json,sys; print(json.load(sys.stdin)['info']['version'])")
          echo "pypi rightos-sdk=$REMOTE (repo python=$PY)"
          if [ "$REMOTE" != "$PY" ]; then
            echo "::warning::PyPI ($REMOTE) lags repo ($PY) — configure PyPI Trusted Publishing and run python-publish"
          fi

      - name: Production API smoke (read-only)
        run: |
          curl -sf "https://rightos.i-s3.com/api/rightos/status" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['status'] == 'operational', d
          for k in ('billing', 'email', 'webhooks', 'adminAuth'):
            assert d['checks'][k]['configured'], f'{k} not configured'
          print('production status OK', d.get('revision'))
          "
